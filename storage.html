<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEDIBYTE TECH - Storage (Entry Logs)</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .btn-back {
            color: var(--text-secondary);
            text-decoration: none;
            display: flex;
            align-items: center;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .btn-back:hover {
            color: var(--primary-color);
        }

        .table-wrapper {
            overflow-x: auto;
            background-color: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            color: var(--text-primary);
        }

        th,
        td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: rgba(255, 255, 255, 0.05);
            font-weight: 600;
            color: var(--text-secondary);
        }
    </style>
</head>

<body>
    <div class="app-layout">
        <nav class="app-navbar">
            <div class="brand brand-contrast">MEDIBYTE TECH</div>
            <div class="nav-links"><button id="logoutBtn" class="btn-logout">Logout</button></div>
        </nav>
        <main class="app-content">
            <div class="page-header">
                <a href="admin.html" class="btn-back">← Back to Dashboard</a>
                <button class="btn" id="exportBtn" style="background-color: #2563eb; color: white;">Export to
                    CSV</button>
            </div>

            <!-- Dashboard Filters & Metrics -->
            <div
                style="background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap;">
                <div style="display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap;">
                    <div style="display: flex; flex-direction: column; gap: 5px;">
                        <label for="fromDate" style="font-size: 0.85rem; font-weight: 600; color: #475569;">From
                            Date</label>
                        <input type="date" id="fromDate"
                            style="padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px; color: #333;">
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 5px;">
                        <label for="toDate" style="font-size: 0.85rem; font-weight: 600; color: #475569;">To
                            Date</label>
                        <input type="date" id="toDate"
                            style="padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px; color: #333;">
                    </div>
                    <button id="applyFilterBtn"
                        style="background-color: #38bdf8; color: #0f172a; font-weight: 600; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; transition: background 0.2s;">Apply
                        Filter</button>
                    <button id="clearFilterBtn"
                        style="background-color: #e2e8f0; color: #475569; font-weight: 600; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; transition: background 0.2s;">Clear</button>
                </div>

                <div
                    style="background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px 25px; text-align: center; margin-top: 15px;">
                    <span style="font-size: 0.85rem; color: #64748b; font-weight: 600; text-transform: uppercase;">Total
                        Charts</span>
                    <div id="totalChartsVal" style="font-size: 1.8rem; color: #10b981; font-weight: 700;">0</div>
                </div>
            </div>

            <div class="dashboard-card" style="max-width: 100%;">
                <h2>Storage - Submitted Entry Logs</h2>
                <div class="table-wrapper">
                    <table id="logsTable">
                        <thead>
                            <tr>
                                <th>User Details</th>
                                <th>Chart ID</th>
                                <th>Project</th>
                                <th>Sub Project</th>
                                <th>Client Login</th>
                                <th>Total Page</th>
                                <th>Total DOS</th>
                                <th>Total ICD</th>
                                <th>Category</th>
                                <th>Timestamp</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="logsBody">
                            <!-- Populated via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script src="auth.js"></script>
    <script>
        Auth.checkAuth('admin');
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('logoutBtn').addEventListener('click', () => Auth.logout());

            const logsBody = document.getElementById('logsBody');
            const logs = Auth.getEntryLogs();
            let currentLogs = [...logs]; // Make a copy for filtering

            function renderTable(dataToRender) {
                logsBody.innerHTML = '';

                // Update total chart count metric
                document.getElementById('totalChartsVal').textContent = dataToRender.length;

                if (dataToRender.length === 0) {
                    logsBody.innerHTML = '<tr><td colspan="11" style="text-align: center; color: var(--text-secondary); padding: 20px;">No logs found for this period.</td></tr>';
                } else {
                    dataToRender.forEach(log => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>
                                <div style="display: flex; flex-direction: column;">
                                    <span style="font-weight: 600; color: #1e293b;">${log.userName || log.userId || 'Unknown'}</span>
                                    <span style="font-size: 0.8rem; color: #64748b;">ID: ${log.userId || 'N/A'}</span>
                                </div>
                            </td>
                            <td><strong>${log.chartId}</strong></td>
                            <td>${log.projectName || '-'}</td>
                            <td>${log.subProjectName || '-'}</td>
                            <td>${log.clientLogin || '-'}</td>
                            <td>${log.totalPage || '-'}</td>
                            <td>${log.totalDos || '-'}</td>
                            <td>${log.totalIcd || '-'}</td>
                            <td>${log.category || '-'}</td>
                            <td>${new Date(log.timestamp).toLocaleString()}</td>
                            <td>
                                <div style="display: flex; gap: 8px;">
                                    <button class="btn-edit" data-id="${log.chartId}" style="background-color: #f59e0b; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.8rem;">Edit</button>
                                    <button class="btn-delete" data-id="${log.chartId}" style="background-color: #ef4444; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.8rem;">Delete</button>
                                </div>
                            </td>
                        `;
                        logsBody.appendChild(tr);
                    });
                }
            }

            // Initial render
            renderTable(currentLogs);

            // Bind Event Listeners for Edit / Delete Buttons
            logsBody.addEventListener('click', (e) => {
                const target = e.target;
                const chartId = target.getAttribute('data-id');

                if (!chartId) return;

                if (target.classList.contains('btn-delete')) {
                    if (confirm(`Are you sure you want to permanently delete Chart ID: ${chartId}?`)) {
                        const res = Auth.deleteEntryLog(chartId);
                        if (res.success) {
                            // Update local variable by re-fetching
                            const allLatestLogs = Auth.getEntryLogs();
                            // Re-run filter logic if necessary, or simply reload table
                            // Easiest is to reload page to ensure state consistency
                            location.reload();
                        } else {
                            alert(res.message);
                        }
                    }
                } else if (target.classList.contains('btn-edit')) {
                    // For a quick, inline-style prompt edit of key fields (Chart ID, Category, etc.)
                    const logToEdit = currentLogs.find(l => l.chartId === chartId);
                    if (!logToEdit) return;

                    const newChartId = prompt("Edit Chart ID:", logToEdit.chartId);
                    if (newChartId === null) return; // cancelled

                    const newProjectName = prompt("Edit Project:", logToEdit.projectName);
                    if (newProjectName === null) return;

                    // Note: If they changed Chart ID, we must delete old record and insert new,
                    // OR rely on updateEntryLog to handle it.
                    // Let's rely on standard Auth capabilities:
                    if (newChartId.trim() !== '' && newChartId.trim() !== logToEdit.chartId) {
                        // Changing the unique ID
                        logToEdit.chartId = newChartId.trim();
                        // Then update project
                        logToEdit.projectName = newProjectName || logToEdit.projectName;

                        // Delete old from storage and push new, OR create a robust update function.
                        // We will delete the old chartId and add the modified object
                        Auth.deleteEntryLog(chartId);
                        Auth.addEntryLog(logToEdit);
                        alert('Entry updated successfully!');
                        location.reload();
                    } else {
                        // Only updating properties
                        const updates = {
                            projectName: newProjectName || logToEdit.projectName
                        };
                        const res = Auth.updateEntryLog(chartId, updates);
                        if (res.success) {
                            alert('Entry updated successfully!');
                            location.reload();
                        }
                    }
                }
            });

            // Filtering Logic
            const applyFilterBtn = document.getElementById('applyFilterBtn');
            const clearFilterBtn = document.getElementById('clearFilterBtn');
            const fromDateInput = document.getElementById('fromDate');
            const toDateInput = document.getElementById('toDate');

            function stripTime(date) {
                return new Date(date.getFullYear(), date.getMonth(), date.getDate());
            }

            applyFilterBtn.addEventListener('click', () => {
                const fromVal = fromDateInput.value;
                const toVal = toDateInput.value;

                if (!fromVal && !toVal) {
                    currentLogs = [...logs];
                    renderTable(currentLogs);
                    return;
                }

                currentLogs = logs.filter(log => {
                    const logTimeStr = log.timestamp || log.auditTimestamp;
                    if (!logTimeStr) return false;

                    const logDate = stripTime(new Date(logTimeStr));

                    if (fromVal && toVal) {
                        const fromD = stripTime(new Date(fromVal));
                        const toD = stripTime(new Date(toVal));
                        // Include the entire To Date end of day by stripping both to just date
                        return logDate >= fromD && logDate <= toD;
                    } else if (fromVal) {
                        const fromD = stripTime(new Date(fromVal));
                        return logDate >= fromD;
                    } else if (toVal) {
                        const toD = stripTime(new Date(toVal));
                        return logDate <= toD;
                    }
                    return true;
                });

                renderTable(currentLogs);
            });

            clearFilterBtn.addEventListener('click', () => {
                fromDateInput.value = '';
                toDateInput.value = '';
                currentLogs = [...logs];
                renderTable(currentLogs);
            });

            const exportBtn = document.getElementById('exportBtn');
            if (exportBtn) {
                exportBtn.addEventListener('click', () => {
                    if (currentLogs.length === 0) {
                        alert('No logs to export.');
                        return;
                    }

                    const headers = ['User Name', 'User ID', 'Chart ID', 'Project', 'Sub Project', 'Client Login', 'Total Page', 'Total DOS', 'Total ICD', 'Category', 'Timestamp'];
                    const rows = currentLogs.map(log => {
                        return [
                            `"${log.userName || log.userId || ''}"`,
                            `"${log.userId || ''}"`,
                            `"${log.chartId || ''}"`,
                            `"${log.projectName || ''}"`,
                            `"${log.subProjectName || ''}"`,
                            `"${log.clientLogin || ''}"`,
                            `"${log.totalPage || ''}"`,
                            `"${log.totalDos || ''}"`,
                            `"${log.totalIcd || ''}"`,
                            `"${log.category || ''}"`,
                            `"${log.timestamp ? new Date(log.timestamp).toLocaleString() : ''}"`
                        ].join(',');
                    });

                    const csvContent = "data:text/csv;charset=utf-8," + headers.join(',') + "\n" + rows.join("\n");
                    const encodedUri = encodeURI(csvContent);
                    const link = document.createElement("a");
                    link.setAttribute("href", encodedUri);
                    link.setAttribute("download", "storage_filtered_export.csv");
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                });
            }
        });
    </script>
</body>

</html>
