<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEDIBYTE TECH - Chart Search</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .page-header {
            margin-bottom: 30px;
        }

        .btn-back {
            color: var(--text-secondary);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .btn-back:hover {
            color: var(--primary-color);
        }

        .search-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .btn-search {
            background-color: #10b981;
            /* Green color requested */
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
            margin-top: 15px;
        }

        .btn-search:hover {
            background-color: #059669;
            /* Darker green on hover */
        }

        .result-card {
            margin-top: 30px;
            padding: 20px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="app-layout">
        <nav class="app-navbar">
            <div class="brand brand-contrast">MEDIBYTE TECH</div>
            <div class="nav-links">
                <button id="logoutBtn" class="btn-logout">Logout</button>
            </div>
        </nav>

        <main class="app-content">
            <div class="page-header">
                <a href="hcc.html" class="btn-back">← Back to HCC</a>
                <h2 style="margin-top: 20px;">Chart Search</h2>
            </div>

            <div class="dashboard-card search-container">
                <form id="chartSearchForm">
                    <div class="form-group">
                        <label for="projectName">Project Name</label>
                        <select id="projectName" required>
                            <option value="">Select Project</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="subProjectName">Sub Project Name</label>
                        <select id="subProjectName" required>
                            <option value="">Select Sub Project</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="chartId">Chart ID</label>
                        <input type="text" id="chartId" placeholder="Enter Chart ID" required>
                    </div>

                    <button type="submit" class="btn-search">Search Chart</button>
                </form>

                <div id="searchMessage" class="message" style="margin-top: 15px;"></div>

                <div id="searchResult" class="result-card">
                    <h3
                        style="margin-top: 0; margin-bottom: 15px; color: #0f172a; border-bottom: 1px solid #e2e8f0; padding-bottom: 8px;">
                        Chart Details Found</h3>
                    <div style="display: grid; grid-template-columns: 1fr; gap: 10px; color: #334155;">
                        <div id="resUserId"><strong>Coded By (User ID):</strong> <span></span></div>
                        <div id="resUserName"><strong>Coder Name:</strong> <span></span></div>
                        <div id="resChartStatus"
                            style="margin-top: 10px; padding-top: 10px; border-top: 1px dashed #cbd5e1;"><strong>Audit
                                Status:</strong> <span style="font-weight: 600;"></span></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="auth.js"></script>
    <script src="chart-search.js"></script>
</body>

</html>
