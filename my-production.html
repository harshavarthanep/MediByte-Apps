<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEDIBYTE TECH - My Production</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .page-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .page-header h1 {
            font-size: 2rem;
            color: #ffffff;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .production-container {
            background: #ffffff;
            border-radius: 8px;
            padding: 30px;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            color: #333333;
        }

        .top-nav {
            padding: 20px 40px;
            width: 100%;
        }

        .btn-back {
            color: var(--text-secondary);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .btn-back:hover {
            color: #38bdf8;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            margin-top: 15px;
        }

        .data-table th,
        .data-table td {
            padding: 15px;
            border-bottom: 1px solid #e2e8f0;
        }

        .data-table th {
            background-color: #f8fafc;
            font-weight: 600;
            color: #475569;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        .data-table tr:hover {
            background-color: #f1f5f9;
        }

        .count-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 0.85rem;
            text-align: center;
            min-width: 35px;
        }

        .badge-entry {
            background-color: #e0f2fe;
            color: #0369a1;
        }

        .badge-audit {
            background-color: #dcfce7;
            color: #166534;
        }

        .badge-total {
            background-color: #f3f4f6;
            color: #1f2937;
            font-size: 1rem;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #64748b;
            font-size: 1.1rem;
        }
    </style>
</head>

<body style="background-color: #0d121e;">
    <div class="app-layout">
        <div class="top-nav">
            <a href="hcc.html" class="btn-back">← Back to HCC</a>
        </div>

        <main class="app-content" style="padding-top: 10px;">
            <div class="page-header">
                <h1>My Production</h1>
            </div>

            <div class="production-container">
                <!-- Date Filters -->
                <div
                    style="background: white; border-bottom: 2px solid #e2e8f0; padding-bottom: 20px; margin-bottom: 20px; display: flex; align-items: flex-end; gap: 15px; flex-wrap: wrap; justify-content: space-between;">
                    <h2 style="color: #1e293b; margin: 0; align-self: center;">Production Summary</h2>
                    <div style="display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap;">
                        <div style="display: flex; flex-direction: column; gap: 5px;">
                            <label for="fromDate" style="font-size: 0.85rem; font-weight: 600; color: #475569;">From
                                Date</label>
                            <input type="date" id="fromDate"
                                style="padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px; color: #333;">
                        </div>
                        <div style="display: flex; flex-direction: column; gap: 5px;">
                            <label for="toDate" style="font-size: 0.85rem; font-weight: 600; color: #475569;">To
                                Date</label>
                            <input type="date" id="toDate"
                                style="padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px; color: #333;">
                        </div>
                        <button id="applyFilterBtn"
                            style="background-color: #38bdf8; color: #0f172a; font-weight: 600; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; transition: background 0.2s;">Apply
                            Filter</button>
                        <button id="clearFilterBtn"
                            style="background-color: #e2e8f0; color: #475569; font-weight: 600; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; transition: background 0.2s;">Clear</button>
                    </div>
                </div>

                <div style="overflow-x: auto;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Project Name</th>
                                <th>Sub Project Name</th>
                                <th style="text-align: center;">Entry Log Count</th>
                                <th style="text-align: center;">Audit Log Count</th>
                                <th style="text-align: center;">Total Charts</th>
                            </tr>
                        </thead>
                        <tbody id="productionTableBody">
                            <!-- Populated via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="auth.js"></script>
    <script>
        Auth.checkAuth('user');

        document.addEventListener('DOMContentLoaded', () => {
            const logs = Auth.getEntryLogs();
            const currentUser = sessionStorage.getItem('currentUser');
            const tbody = document.getElementById('productionTableBody');

            // Strip time for clean Date comparisons
            function stripTime(date) {
                return new Date(date.getFullYear(), date.getMonth(), date.getDate());
            }

            function renderProduction(logsToRender) {
                // Filter to only the current user's logs
                const userLogs = logsToRender.filter(l => l.userId === currentUser);

                if (userLogs.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state">No charts submitted for this period.</div></td></tr>';
                    return;
                }

                // Group by Project and Sub Project
                const grouped = {};

                userLogs.forEach(log => {
                    const proj = log.projectName || 'Unassigned';
                    const subProj = log.subProjectName || 'Unassigned';
                    const key = `${proj}|||${subProj}`;

                    if (!grouped[key]) {
                        grouped[key] = {
                            project: proj,
                            subProject: subProj,
                            entryCount: 0,
                            auditCount: 0,
                            totalCount: 0
                        };
                    }

                    grouped[key].totalCount++;

                    if (log.auditStatus === 'Audited') {
                        grouped[key].auditCount++;
                    } else {
                        grouped[key].entryCount++;
                    }
                });

                tbody.innerHTML = ''; // Clear existing
                // Iterate and render rows
                Object.values(grouped).forEach(group => {
                    const tr = document.createElement('tr');

                    tr.innerHTML = `
                        <td style="font-weight: 500; color: #0f172a;">${group.project}</td>
                        <td style="color: #475569;">${group.subProject}</td>
                        <td style="text-align: center;">
                            <span class="count-badge badge-entry">${group.entryCount}</span>
                        </td>
                        <td style="text-align: center;">
                            <span class="count-badge badge-audit">${group.auditCount}</span>
                        </td>
                        <td style="text-align: center;">
                            <span class="count-badge badge-total">${group.totalCount}</span>
                        </td>
                    `;

                    tbody.appendChild(tr);
                });
            }

            // Initial render
            renderProduction(logs);

            // Filter logic
            const applyFilterBtn = document.getElementById('applyFilterBtn');
            const clearFilterBtn = document.getElementById('clearFilterBtn');
            const fromDateInput = document.getElementById('fromDate');
            const toDateInput = document.getElementById('toDate');

            applyFilterBtn.addEventListener('click', () => {
                const fromVal = fromDateInput.value;
                const toVal = toDateInput.value;

                if (!fromVal && !toVal) {
                    renderProduction(logs);
                    return;
                }

                const filteredLogs = logs.filter(log => {
                    // Use the original entry timestamp or the auditTimestamp depending on the project spec. 
                    // Usually we use the entry timestamp for "Production" matching when the chart was submitted.
                    const logTimeStr = log.timestamp || log.auditTimestamp;
                    if (!logTimeStr) return false;

                    const logDate = stripTime(new Date(logTimeStr));

                    if (fromVal && toVal) {
                        const fromD = stripTime(new Date(fromVal));
                        const toD = stripTime(new Date(toVal));
                        // Include the entire To Date end of day by stripping both to just date
                        return logDate >= fromD && logDate <= toD;
                    } else if (fromVal) {
                        const fromD = stripTime(new Date(fromVal));
                        return logDate >= fromD;
                    } else if (toVal) {
                        const toD = stripTime(new Date(toVal));
                        return logDate <= toD;
                    }
                    return true;
                });

                renderProduction(filteredLogs);
            });

            clearFilterBtn.addEventListener('click', () => {
                fromDateInput.value = '';
                toDateInput.value = '';
                renderProduction(logs);
            });
        });
    </script>
</body>

</html>
