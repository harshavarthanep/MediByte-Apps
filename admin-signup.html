<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEDIBYTE TECH - Admin Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1 class="brand brand-contrast">MEDIBYTE TECH</h1>
            <p>Admin Portal - Create a New Admin Account</p>
        </div>

        <div id="signupMessage" class="message"></div>

        <form id="adminSignupForm">
            <div class="form-group">
                <label for="adminEmail">Email</label>
                <input type="email" id="adminEmail" placeholder="Enter your email address" required
                    autocomplete="email">
            </div>

            <div class="form-group">
                <label for="adminId">Admin User ID</label>
                <input type="text" id="adminId" placeholder="Choose an Admin User ID" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="adminPassword">Admin Password</label>
                <input type="password" id="adminPassword" placeholder="Create a password" required
                    autocomplete="new-password">
            </div>

            <div class="form-group">
                <label for="adminAuthPassword">Admin Authorization Password</label>
                <input type="password" id="adminAuthPassword" placeholder="Required for signup authorization" required>
            </div>

            <button type="submit" class="btn">Sign Up as Admin</button>
        </form>

        <div class="auth-links">
            <a href="admin-login.html">Already have an admin account? Login here</a>
            <a href="index.html">Back to User Login</a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="auth.js"></script>
    <script src="admin-signup.js"></script>
</body>

</html>
